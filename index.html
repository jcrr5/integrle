<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#5B9E7A" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Integrle" />
    <link rel="apple-touch-icon" href="/logo192.png" />

    <title>Integrle</title>

    <style>
      /* 1. Prevent "Gray Flash" on taps (Mobile Safari/Chrome) */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      /* 2. Prevent accidental zooming on inputs */
      input, select, textarea {
        font-size: 16px !important;
      }

      /* 3. Handle the 'Safe Area' for the notch/home bar */
      body {
        margin: 0;
        padding: 0;
        /* These variables ensure the app fills the whole screen behind the notch */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        background-color: #FAF6F0; /* Matches your app background */
        overflow: hidden; /* Prevents bouncy scrolling on the whole page */
      }

      #root {
        height: 100vh;
        width: 100vw;
        overflow-y: auto; /* Only allow scrolling inside the app container */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
